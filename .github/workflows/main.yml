name: K70 Ubuntu Port CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'dts/**'
      - 'kernel/**'
      - 'edk2/**'
      - '.github/workflows/**'
      - 'scripts/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Build target'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - kernel
          - edk2
          - rootfs
      kernel_version:
        description: 'Kernel version tag'
        required: true
        default: 'v6.12'

env:
  DEVICE: vermeer
  SOC: sm8550

jobs:
  build-kernel:
    if: github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'kernel' || github.event_name != 'workflow_dispatch'
    uses: ./.github/workflows/reusable/kernel-build.yml
    with:
      kernel_version: ${{ github.event.inputs.kernel_version || 'v6.12' }}
      device: vermeer
      soc: sm8550
      defconfig: sm8550_defconfig

  build-edk2:
    if: github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'edk2' || github.event_name != 'workflow_dispatch'
    uses: ./.github/workflows/reusable/edk2-build.yml
    with:
      device: vermeer
      soc: sm8550

  build-rootfs:
    if: github.event.inputs.build_target == 'all' || github.event.inputs.build_target == 'rootfs' || github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Build rootfs
        run: bash .github/workflows/scripts/build-rootfs.sh
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-vermeer-${{ github.run_number }}
          path: out/rootfs/
          retention-days: 30

  release:
    needs: [build-kernel, build-edk2, build-rootfs]
    runs-on: ubuntu-24.04
    if: always() && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*-vermeer-*"
      - name: Organize
        run: |
          mkdir -p out/boot out/edk2 out/rootfs
          cp artifacts/kernel-*/boot/* out/boot/ 2>/dev/null || true
          cp artifacts/kernel-*/modules/* out/modules/ 2>/dev/null || true
          cp artifacts/edk2-*/* out/edk2/ 2>/dev/null || true
          cp artifacts/rootfs-*/* out/rootfs/ 2>/dev/null || true
          bash .github/workflows/scripts/pack-release.sh
      - name: Create Release
        if: github.ref == 'refs/heads/main' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: vermeer-${{ github.run_number }}
          name: "K70 Ubuntu Port Build ${{ github.run_number }}"
          body: |
            自动构建的 K70 (vermeer) Ubuntu 移植镜像
          files: out/k70-ubuntu-port-release.zip
          draft: true
          prerelease: true